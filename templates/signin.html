<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MiniNode - Wallet Login</title>
  <link rel="stylesheet" href="/static/css/sigin.css">
  
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <div class="user-avatar">
        <img src="https://img.icons8.com/fluency/96/user-male-circle.png" alt="User Avatar"/>
      </div>
      <h2>Welcome Back</h2>
      <button id="connectBtn">🔗 Connect Wallet</button>
      <div class="status" id="status">Not connected</div>
    </div>
  </div>
 

  <script type="module">
    // Correct imports: SignClient is the default export and must be initialised with .init()
    import SignClient from "https://esm.sh/@walletconnect/sign-client@2";
    import { WalletConnectModal } from "https://esm.sh/@walletconnect/modal@2";

    const projectId = "95d9e6d3a71535bb49bbdcebf0a075b8"; 
    const connectBtn = document.getElementById("connectBtn");
    const statusDiv = document.getElementById("status");

    const modal = new WalletConnectModal({
      projectId,
      themeMode: "dark",
    });

    let signClient; // will hold the initialized client

    async function initSignClient() {
      if (signClient) return signClient;
      // SignClient.init returns an instance
      signClient = await SignClient.init({
        projectId,
        metadata: {
          name: "MiniNode",
          description: "Login with wallet",
          url: window.location.origin,
          icons: ["https://img.icons8.com/fluency/96/user-male-circle.png"],
        },
      });
      return signClient;
    }

    connectBtn.addEventListener("click", async () => {
      try {
        await initSignClient();

        // connect() returns { uri, approval }
        const { uri, approval } = await signClient.connect({
          requiredNamespaces: {
            eip155: {
              methods: ["personal_sign"],
              chains: ["eip155:1"], // use the chain(s) you support
              events: ["accountsChanged", "chainChanged"],
            },
          },
        });

        // If a uri is provided, open modal for QR / deep link
        if (uri) modal.openModal({ uri });

        // Wait for the user to approve the session
        const session = await approval();
        modal.closeModal();

        // Extract EVM account (namespace format: eip155:1:0xABC...)
        const account = session.namespaces.eip155.accounts[0].split(":")[2];
        statusDiv.innerText = `Connected: ${account}`;

        // --- Sign-in flow (nonce -> sign -> verify) ---
        const nonceRes = await fetch(`/api/v1/auth/wallet/nonce?wallet_address=${account}`);
        if (!nonceRes.ok) throw new Error("Failed to fetch nonce");
        const { nonce } = await nonceRes.json();

        // ask wallet to sign nonce
        const signature = await signClient.request({
          topic: session.topic,
          chainId: "eip155:1",
          request: {
            method: "personal_sign",
            params: [nonce, account],
          },
        });

        // send signature to backend for verification/login
        const loginRes = await fetch(`/api/v1/auth/wallet/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ wallet_address: account, signature }),
        });

        const data = await loginRes.json();
        if (loginRes.ok) {
          statusDiv.innerText = `✅ Login successful`;
          window.location.href = "/";
        } else {
          statusDiv.innerText = `❌ Login failed: ${data.detail || JSON.stringify(data)}`;
        }
      } catch (err) {
        console.error(err);
        statusDiv.innerText = `Error: ${err.message || err}`;
      }
    });
  </script>
</body>
<script>
  /* Random Background */
document.body.style.setProperty('--rand1', Math.random());
document.body.style.setProperty('--rand2', Math.random());
document.body.style.setProperty('--rand3', Math.random()); 
</script>
</html>
